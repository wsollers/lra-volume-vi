# Inert template only. Do not place this file under `.github/workflows/`
# until Phase 3F/3G review explicitly approves activation.
#
# This workflow mirrors `volume-vii/` into the monorepo using rsync.
# `rsync --delete` is destructive; run and review dry-run output first.

name: Sync Volume VII to Monorepo

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run rsync without writing changes"
        required: true
        default: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout volume repo
        uses: actions/checkout@v4
        with:
          path: volume-repo

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Dry-run sync volume-vii
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          rsync -av --delete --dry-run volume-repo/volume-vii/ monorepo/volume-vii/

      - name: Sync volume-vii
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          rsync -av --delete volume-repo/volume-vii/ monorepo/volume-vii/

      - name: Commit monorepo sync
        if: ${{ github.event.inputs.dry_run == 'false' }}
        working-directory: monorepo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add volume-vii
          git diff --cached --quiet || git commit -m "chore: sync volume-vii from lra-volume-vii"
          git push

