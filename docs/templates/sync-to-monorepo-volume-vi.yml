# Inert template only. Do not place this file under .github/workflows/
# until review explicitly approves activation.
#
# This workflow mirrors volume-vi/ and its volume-owned bibliography shard into
# the monorepo. rsync --delete applies only to volume-vi/; bibliography sync
# copies one shard without deleting other volume bibliography files.

name: Sync Volume VI to Monorepo

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run rsync without writing changes"
        required: true
        default: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout volume repo
        uses: actions/checkout@v4
        with:
          path: volume-repo

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Dry-run sync volume-vi and bibliography
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          rsync -av --delete --dry-run volume-repo/volume-vi/ monorepo/volume-vi/
          mkdir -p monorepo/bibliography
          cmp -s volume-repo/bibliography/volume-vi-computational.bib monorepo/bibliography/volume-vi-computational.bib || echo "bibliography/volume-vi-computational.bib would be updated"

      - name: Sync volume-vi
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          rsync -av --delete volume-repo/volume-vi/ monorepo/volume-vi/

      - name: Validate volume bibliography
        run: |
          cd volume-repo
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Sync volume-vi bibliography
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          mkdir -p monorepo/bibliography
          cp volume-repo/bibliography/volume-vi-computational.bib monorepo/bibliography/volume-vi-computational.bib

      - name: Commit monorepo sync
        if: ${{ github.event.inputs.dry_run == 'false' }}
        working-directory: monorepo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add volume-vi bibliography/volume-vi-computational.bib
          git diff --cached --quiet || git commit -m "chore: sync volume-vi from lra-volume-vi"
          git push