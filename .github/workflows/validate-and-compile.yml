name: Validate and Compile Volume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-compile-${{ github.repository }}
  cancel-in-progress: true

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: volume

      - name: Checkout governance
        uses: actions/checkout@v4
        with:
          repository: wsollers/lra-governance
          path: lra-governance

      - name: Checkout common
        uses: actions/checkout@v4
        with:
          repository: wsollers/lra-common
          path: lra-common

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install validator dependencies
        run: python -m pip install pyyaml

      - name: Run governance validator
        working-directory: volume
        env:
          LRA_GOVERNANCE_ROOT: ${{ github.workspace }}/lra-governance
        run: python ../lra-governance/scripts/build_volume.py --root . --validate-only

      - name: Compile digital PDF
        run: |
          python lra-governance/tools/governance/build_volume_docker.py \
            --root volume \
            --common-root lra-common \
            --skip-validate \
            --output-dir pdf-output/digital

      - name: Verify digital PDF
        run: |
          python3 - <<'PY'
          from pathlib import Path

          pdfs = sorted(Path("pdf-output/digital").glob("*.pdf"))
          if not pdfs:
              raise SystemExit("no digital PDFs were produced")
          for pdf in pdfs:
              data = pdf.read_bytes()
              if not data.startswith(b"%PDF-"):
                  raise SystemExit(f"{pdf} does not start with a PDF header")
              if b"%%EOF" not in data[-2048:]:
                  raise SystemExit(f"{pdf} is missing a PDF EOF trailer")
          PY

      - name: Clean LaTeX build output
        run: |
          python lra-governance/tools/governance/build_volume_docker.py \
            --root volume \
            --common-root lra-common \
            --skip-validate \
            --skip-image-build \
            --latex-command latexmk -C

      - name: Compile print PDF
        run: |
          python lra-governance/tools/governance/build_volume_docker.py \
            --root volume \
            --common-root lra-common \
            --skip-validate \
            --skip-image-build \
            --print-edition \
            --output-dir pdf-output/print

      - name: Verify print PDF
        run: |
          python3 - <<'PY'
          from pathlib import Path

          pdfs = sorted(Path("pdf-output/print").glob("*.pdf"))
          if not pdfs:
              raise SystemExit("no print PDFs were produced")
          for pdf in pdfs:
              data = pdf.read_bytes()
              if not data.startswith(b"%PDF-"):
                  raise SystemExit(f"{pdf} does not start with a PDF header")
              if b"%%EOF" not in data[-2048:]:
                  raise SystemExit(f"{pdf} is missing a PDF EOF trailer")
          PY

      # SYNC_PAT here authorizes publishing built PDFs to lra-volumes-output.
      # It is NOT the retired governance/volume sync; it is the independent
      # build's publish step.
      - name: Checkout output repository
        uses: actions/checkout@v4
        with:
          repository: wsollers/lra-volumes-output
          token: ${{ secrets.SYNC_PAT }}
          ref: main
          path: output
          fetch-depth: 0

      - name: Publish PDFs to output repository
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          mkdir -p output/digital output/print
          python3 - <<'PY'
          from pathlib import Path

          repo = Path("${{ github.repository }}").name

          def publish(edition: str) -> None:
              source = Path("pdf-output") / edition
              target = Path("output") / edition
              for pdf in sorted(source.glob("*.pdf")):
                  if pdf.stem == "main":
                      name = f"{repo}.pdf"
                  elif pdf.stem.startswith("volume-"):
                      name = pdf.name
                  elif pdf.stem.startswith("main-book-"):
                      name = f"{repo}-{pdf.stem.removeprefix('main-')}.pdf"
                  else:
                      name = f"{repo}-{pdf.stem}.pdf"
                  (target / name).write_bytes(pdf.read_bytes())

          publish("digital")
          publish("print")
          PY
          cd output
          git config core.autocrlf false
          git config user.name "lra-pdf-bot"
          git config user.email "lra-pdf-bot@noreply.github.com"
          git add digital/.gitkeep print/.gitkeep
          git add -f digital/*.pdf print/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to publish"
            exit 0
          fi
          git commit -m "Update ${repo} PDFs"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            sleep 5
          done
          exit 1
