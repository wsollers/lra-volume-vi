name: Sync volume-vi to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-vi/**'
      - 'bibliography/volume-vi-computational.bib'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run rsync without writing changes"
        required: true
        default: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-vi
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Dry-run sync volume-vi and bibliography
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          rsync -av --delete --dry-run source/volume-vi/ monorepo/volume-vi/
          mkdir -p monorepo/bibliography
          cmp -s source/bibliography/volume-vi-computational.bib monorepo/bibliography/volume-vi-computational.bib || echo "bibliography/volume-vi-computational.bib would be updated"

      - name: Validate volume bibliography
        run: |
          cd source
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Validate leaf proof stubs
        run: |
          cd source
          python scripts/validate_leaf_proofs.py --root . --strict

      - name: Sync volume-vi into monorepo
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
        run: |
          rsync -av --delete source/volume-vi/ monorepo/volume-vi/

      - name: Sync volume-vi bibliography into monorepo
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
        run: |
          mkdir -p monorepo/bibliography
          cp source/bibliography/volume-vi-computational.bib monorepo/bibliography/volume-vi-computational.bib

      - name: Commit and push if changed
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
        working-directory: monorepo
        run: |
          git config user.name "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-vi/ bibliography/volume-vi-computational.bib
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-vi from lra-volume-vi"
          git push